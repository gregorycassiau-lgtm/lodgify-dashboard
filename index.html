<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reporting locatif — données en direct</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{--navy:#1F3B5C;--blue:#2E6CA4;--green:#1D9E75;--grey:#5A5F66;--border:#E2E5EA;--bg:#F7F8FA;
        --lightgreen:#E3F1E7;--lightgrey:#F2F4F7;--amber:#BA7517;--red:#C0392B;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#222;background:var(--bg);padding:24px;}
  .wrap{max-width:1080px;margin:0 auto;}
  h1{font-size:22px;color:var(--navy);font-weight:600;}
  .sub{color:var(--grey);font-size:13px;margin-top:4px;}
  .tabs{display:flex;gap:8px;margin:20px 0;flex-wrap:wrap;}
  .tab{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:var(--grey);}
  .tab.active{background:#E6F1FB;color:var(--blue);border-color:#B5D4F4;font-weight:600;}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
  .kpi{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .kpi .l{font-size:12px;color:var(--grey);}
  .kpi .v{font-size:22px;font-weight:600;color:var(--navy);margin-top:3px;}
  .kpi .d{font-size:11.5px;font-weight:600;margin-top:4px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;}
  .card h2{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--grey);margin-bottom:12px;font-weight:600;}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
  th:first-child,td:first-child{text-align:left;}
  th{font-size:11px;color:var(--grey);font-weight:600;}
  tr.hot td{background:var(--lightgreen);}
  .pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;}
  .loading,.error{text-align:center;padding:60px 20px;color:var(--grey);}
  .error{color:#A32D2D;}
  .obj-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
  .obj-amount{font-size:20px;font-weight:600;color:var(--navy);}
  .obj-amount span{color:var(--grey);font-weight:400;font-size:15px;}
  .obj-delta{font-size:14px;font-weight:600;}
  .bar{height:12px;border-radius:6px;background:var(--lightgrey);overflow:hidden;}
  .bar>div{height:100%;border-radius:6px;transition:width .5s ease;}
  .note{font-size:12px;color:var(--grey);margin-top:8px;}
  .pace{font-size:13.5px;padding:10px 12px;border-radius:8px;background:var(--lightgrey);margin-bottom:12px;}
  .advice{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .adv{border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
  .adv .h{font-size:12px;font-weight:700;color:var(--navy);}
  .adv .m{font-size:11px;color:var(--grey);margin:2px 0 6px;}
  .adv .msg{font-size:12.5px;line-height:1.45;color:#333;}
  .tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;margin-bottom:6px;}
  .tag.ok{background:var(--lightgreen);color:#27500A;}
  .tag.warn{background:#FAEEDA;color:#854F0B;}
  .tag.hot{background:#FCEBEB;color:#A32D2D;}
  .gaplist{list-style:none;font-size:13px;}
  .gaplist li{padding:6px 0;border-bottom:1px solid var(--border);}
  .gaplist li:last-child{border-bottom:none;}
  .minstay{font-size:13px;line-height:1.5;padding:10px 12px;border-radius:8px;background:#FFF9EE;border:1px solid #F0E2C4;margin-top:10px;}
  .ytabs{display:flex;gap:6px;margin-bottom:10px;}
  .ytab{padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;background:var(--lightgrey);color:var(--grey);}
  .ytab.active{background:var(--navy);color:#fff;font-weight:600;}
  .yoy{font-size:10.5px;font-weight:600;margin-top:2px;}
  .diag{background:#FCEBEB;color:#A32D2D;padding:8px 12px;border-radius:8px;font-size:12.5px;margin-bottom:10px;line-height:1.4;}
  .copybtn{padding:8px 14px;border:1px solid var(--blue);background:#E6F1FB;color:var(--blue);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin:2px 8px 10px 0;}
  .copybtn:hover{background:#d6e8f9;}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr);}.charts{grid-template-columns:1fr;}.advice{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Reporting locatif — données en direct</h1>
    <div class="sub" id="sub">Chargement des données Lodgify…</div>
  </header>
  <div id="app"><div class="loading">Chargement…</div></div>
</div>

<script>
const OBJECTIF=40000;
const FR_MONTHS=["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
const FR_LONG=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
function fmtMonth(ym){const[y,m]=ym.split("-");return`${FR_MONTHS[+m-1]} ${y.slice(2)}`;}
function euro(n){return Math.round(n).toLocaleString("fr-FR")+" €";}
function occColor(v){if(v>=65)return"#27500A";if(v>=35)return"#639922";if(v>=15)return"#BA7517";if(v>0)return"#E24B4A";return"#D8D6CE";}
function pill(v){const c=occColor(v);return`<span class="pill" style="background:${c}22;color:${c}">${v.toFixed(1).replace(".",",")} %</span>`;}
function daysInMonth(ym){const[y,m]=ym.split("-").map(Number);return new Date(y,m,0).getDate();}
function fmtDay(iso){const[y,m,d]=iso.split("-");return`${+d} ${FR_MONTHS[+m-1]}`;}
const YEAR=new Date().getFullYear(), PREV=YEAR-1;

let DATA=null,VIEWS=[],current=0,detailYear=null,occChart=null,revChart=null;

async function load(){
  try{
    const res=await fetch("/.netlify/functions/reporting");
    if(!res.ok)throw new Error("Erreur "+res.status);
    DATA=await res.json();
    if(!DATA.properties||DATA.properties.length===0)throw new Error("Aucune réservation trouvée.");
    // Prépare le calendrier normalisé (occ 0..1) pour chaque maison
    for(const p of DATA.properties){
      p.cal=(p.next60||[]).map(d=>({date:d.date,occ:d.booked?1:0,booked:d.booked}));
    }
    VIEWS=[...DATA.properties];
    if(DATA.properties.length>1)VIEWS.push(buildTotal(DATA.properties));
    document.getElementById("sub").textContent="Mis à jour le "+new Date(DATA.generatedAt).toLocaleString("fr-FR");
    render();
  }catch(e){
    document.getElementById("app").innerHTML=`<div class="error">Impossible de charger les données.<br>${e.message}</div>`;
    document.getElementById("sub").textContent="Erreur de chargement";
  }
}

function buildTotal(props){
  const map={},n=props.length;
  for(const p of props)for(const m of p.months){
    if(!map[m.month])map[m.month]={nights:0,revenue:0};
    map[m.month].nights+=m.nights;map[m.month].revenue+=m.revenue;
  }
  const months=Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).map(([ym,v])=>{
    const days=daysInMonth(ym);
    return{month:ym,nights:v.nights,revenue:Math.round(v.revenue),
      occupancy:Math.round(v.nights/(days*n)*1000)/10,avgPrice:v.nights?Math.round(v.revenue/v.nights):0};
  });
  // Calendrier agrégé : occ = fraction de maisons occupées ce jour
  const len=props[0].cal?props[0].cal.length:0, cal=[];
  for(let i=0;i<len;i++){
    let c=0;for(const p of props)c+=(p.cal[i]&&p.cal[i].booked)?1:0;
    cal.push({date:props[0].cal[i].date,occ:c/n});
  }
  const ytd={thisYear:{nights:0,revenue:0},lastYear:{nights:0,revenue:0}};
  for(const p of props){if(p.ytd){ytd.thisYear.revenue+=p.ytd.thisYear.revenue;ytd.thisYear.nights+=p.ytd.thisYear.nights;
    ytd.lastYear.revenue+=p.ytd.lastYear.revenue;ytd.lastYear.nights+=p.ytd.lastYear.nights;}}
  const turnovers=[];
  for(const p of props)for(const t of (p.turnovers||[]))turnovers.push({...t,house:p.name});
  turnovers.sort((a,b)=>a.checkout.localeCompare(b.checkout));
  return{propertyId:"__total__",name:`Total (${n} maisons)`,months,cal,ytd,turnovers,isTotal:true,nProps:n};
}

// Occupation moyenne d'une fenêtre [start,end[ du calendrier (en %)
function windowOcc(view,start,end){
  const s=view.cal.slice(start,end);if(!s.length)return 0;
  return s.reduce((a,d)=>a+d.occ,0)/s.length*100;
}

function priceCard(occ,horizon){
  const peak=false;let tag,cls,msg;
  if(occ>=70){tag="Bien rempli";cls="ok";msg="Tiens tes prix, +5 à 10 % possible sur les derniers créneaux libres.";}
  else if(occ>=40){tag="Correct";cls="warn";
    msg=horizon==="J-7"?"Promo dernière minute (−10 %) sur les dates restantes.":"Baisse légère (−5 à 10 %) pour accélérer.";}
  else{tag="À surveiller";cls="hot";
    msg=horizon==="J-7"?"⚠️ Proche et peu rempli : −15 à 20 % + min. 2 nuits pour sauver les nuits.":
        horizon==="J-21"?"Sous-rempli : −10 à 15 % dès maintenant, ouvre les séjours courts.":
        "Amorce une baisse de −5 à 10 % et surveille chaque semaine.";}
  return{tag,cls,msg,occ};
}

// Détecte les trous isolés de 1-2 nuits (entourés d'au moins une réservation)
function findGaps(view){
  if(view.isTotal)return[];
  const cal=view.cal,gaps=[];let i=0;
  while(i<cal.length){
    if(!cal[i].booked){
      let j=i;while(j<cal.length&&!cal[j].booked)j++;
      const len=j-i, before=i>0&&cal[i-1].booked, after=j<cal.length&&cal[j].booked;
      if(len<=2&&(before||after)){
        gaps.push({start:cal[i].date,end:cal[j-1].date,len});
      }
      i=j;
    }else i++;
  }
  return gaps.slice(0,6);
}

function minStayTip(view){
  const occ60=windowOcc(view,0,60);
  const hasPeak=view.cal.some(d=>[6,7,8].includes(+d.date.split("-")[1]));
  if(hasPeak&&occ60>=55)
    return "Haute saison qui se remplit : passe la durée minimale à 3-4 nuits sur juillet-août pour éviter les nuits orphelines et sécuriser des séjours plus longs.";
  if(occ60<35)
    return "Période creuse : baisse la durée minimale à 1-2 nuits pour capter les courts séjours et remplir les trous.";
  return "Durée minimale de 2 nuits adaptée ; autorise 1 nuit uniquement sur les trous isolés repérés ci-dessus.";
}

function render(){
  const view=VIEWS[current];
  const months=view.months;

  // KPI année en cours + delta N-1
  const cur=months.filter(m=>m.month.startsWith(String(YEAR)));
  const prev=months.filter(m=>m.month.startsWith(String(PREV)));
  const revCur=cur.reduce((s,m)=>s+m.revenue,0), revPrev=prev.reduce((s,m)=>s+m.revenue,0);
  const nCur=cur.reduce((s,m)=>s+m.nights,0), nPrev=prev.reduce((s,m)=>s+m.nights,0);
  const avgCur=nCur?Math.round(revCur/nCur):0, avgPrev=nPrev?Math.round(revPrev/nPrev):0;
  const best=cur.reduce((a,b)=>b.occupancy>(a?a.occupancy:-1)?b:a,null)||{};

  function delta(c,p,unit){
    if(p===0)return`<div class="d" style="color:var(--grey)">nouveau vs ${PREV}</div>`;
    const d=c-p,up=d>=0;const col=up?"var(--green)":"var(--red)";
    return`<div class="d" style="color:${col}">${up?"▲":"▼"} ${up?"+":"−"}${Math.abs(d).toLocaleString("fr-FR")}${unit} vs ${PREV}</div>`;
  }

  // Objectif
  const target=view.isTotal?OBJECTIF*view.nProps:OBJECTIF;
  const delta_=Math.max(0,target-revCur), pct=Math.min(100,Math.round(revCur/target*100));
  const barColor=pct>=100?"#1D9E75":pct>=60?"#2E6CA4":pct>=30?"#BA7517":"#C0392B";

  // Conseils prix par horizon (fenêtres réelles)
  const j7=priceCard(windowOcc(view,0,7),"J-7");
  const j21=priceCard(windowOcc(view,7,21),"J-21");
  const j60=priceCard(windowOcc(view,21,60),"J-60");

  // Rythme vs l'an dernier
  const dataMissing = !view.ytd || !view.cal || view.cal.length===0;
  const diag = dataMissing
    ? `<div class="diag">⚠️ La fonction <b>reporting.js</b> ne renvoie pas encore le calendrier jour par jour. Redéploie-la (puis attends ~5 min ou force le rafraîchissement) pour des conseils propres à chaque maison.</div>` : "";
  const y=view.ytd;
  let pace;
  if(!view.ytd){
    pace=`Rythme indisponible tant que la fonction n'est pas à jour.`;
  }else if(y.lastYear.revenue===0){
    pace=`Pas d'activité à la même date en ${PREV} pour cette maison (annonce plus récente).`;
  }else{
    const d=y.thisYear.revenue-y.lastYear.revenue, up=d>=0, pc=Math.round(d/y.lastYear.revenue*100);
    pace=`À la même date en ${PREV}, tu avais réservé <b>${euro(y.lastYear.revenue)}</b>. Cette année : <b>${euro(y.thisYear.revenue)}</b> `+
         `<span style="color:${up?"var(--green)":"var(--red)"};font-weight:600">(${up?"+":""}${pc} %)</span>.`;
  }

  const gaps=findGaps(view);
  const gapsHtml=view.isTotal
    ? `<div class="note">Analyse des trous à consulter maison par maison (onglets ci-dessus).</div>`
    : (gaps.length
        ? `<ul class="gaplist">${gaps.map(g=>`<li>Trou de <b>${g.len} nuit${g.len>1?"s":""}</b> : ${g.start===g.end?fmtDay(g.start):fmtDay(g.start)+" → "+fmtDay(g.end)} — à combler (min. 1 nuit + petite remise)</li>`).join("")}</ul>`
        : `<div class="note">Aucun trou isolé de 1-2 nuits sur les 60 prochains jours. 👍</div>`);

  const tabs=VIEWS.map((v,i)=>`<div class="tab ${i===current?"active":""}" onclick="sel(${i})">${v.name}</div>`).join("");

  document.getElementById("app").innerHTML=`
    <div class="tabs">${tabs}</div>
    <div class="kpis">
      <div class="kpi"><div class="l">Revenu ${YEAR}</div><div class="v">${euro(revCur)}</div>${delta(revCur,revPrev," €")}</div>
      <div class="kpi"><div class="l">Nuits vendues ${YEAR}</div><div class="v">${nCur}</div>${delta(nCur,nPrev,"")}</div>
      <div class="kpi"><div class="l">Prix moyen / nuit ${YEAR}</div><div class="v">${avgCur} €</div>${delta(avgCur,avgPrev," €")}</div>
      <div class="kpi"><div class="l">Meilleur mois ${YEAR}</div><div class="v" style="font-size:15px">${best.month?fmtMonth(best.month):"—"}</div><div class="d" style="color:var(--grey)">${best.month?best.occupancy.toFixed(0)+" % rempli":""}</div></div>
    </div>

    <div class="card">
      <h2>Objectif ${YEAR} — ${euro(target)}${view.isTotal?` (${view.nProps} × 40 000 €)`:""}</h2>
      <div class="obj-top">
        <div class="obj-amount">${euro(revCur)} <span>/ ${euro(target)} réservés</span></div>
        <div class="obj-delta" style="color:${pct>=100?"#1D9E75":"#C0392B"}">${pct>=100?"🎉 Objectif atteint !":`Reste à réserver : ${euro(delta_)}`}</div>
      </div>
      <div class="bar"><div style="width:${pct}%;background:${barColor}"></div></div>
      <div class="note">${pct} % de l'objectif annuel déjà réservé.</div>
    </div>

    ${buildCleaningCard(view)}

    <div class="card">
      <h2>Conseils tarifaires — 60 prochains jours</h2>
      ${diag}
      <div class="pace">📈 ${pace}</div>
      <div class="advice">
        ${[["J-7","0 à 7 jours",j7],["J-21","8 à 21 jours",j21],["J-60","22 à 60 jours",j60]].map(([h,sub,c])=>`
          <div class="adv"><div class="h">${h}</div><div class="m">${sub} · ${c.occ.toFixed(0)} % rempli</div>
            <span class="tag ${c.cls}">${c.tag}</span><div class="msg">${c.msg}</div></div>`).join("")}
      </div>
      <div class="note">Occupation calculée jour par jour sur le calendrier réel. Plus la date est proche (J-7), plus la baisse doit être forte pour remplir.</div>
    </div>

    <div class="card">
      <h2>Optimisation du calendrier — 60 prochains jours</h2>
      ${gapsHtml}
      <div class="minstay">🛏️ <b>Durée minimale :</b> ${minStayTip(view)}</div>
    </div>

    <div class="charts">
      <div class="card"><h2>Taux de remplissage (historique)</h2><div style="position:relative;height:230px"><canvas id="occ"></canvas></div></div>
      <div class="card"><h2>Revenus mensuels (historique)</h2><div style="position:relative;height:230px"><canvas id="rev"></canvas></div></div>
    </div>
    ${buildDetailTable(view)}`;

  const labels=months.map(m=>fmtMonth(m.month));
  if(occChart)occChart.destroy();
  occChart=new Chart(document.getElementById("occ"),{type:"bar",
    data:{labels,datasets:[{data:months.map(m=>m.occupancy),backgroundColor:months.map(m=>occColor(m.occupancy)),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(1)+" %"}}},
      scales:{y:{max:100,ticks:{callback:v=>v+"%"}},x:{ticks:{font:{size:10},maxRotation:45}}}}});
  if(revChart)revChart.destroy();
  revChart=new Chart(document.getElementById("rev"),{type:"bar",
    data:{labels,datasets:[{data:months.map(m=>m.revenue),backgroundColor:"#2E6CA4",borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>euro(c.parsed.y)}}},
      scales:{y:{ticks:{callback:v=>v.toLocaleString("fr-FR")+" €"}},x:{ticks:{font:{size:10},maxRotation:45}}}}});
}

// Tableau détail avec onglets par année + comparaison N-1
function buildDetailTable(view){
  const years=[...new Set(view.months.map(m=>m.month.slice(0,4)))].sort();
  if(detailYear===null||!years.includes(detailYear)) detailYear=years[years.length-1];
  const tabs=years.map(yr=>`<span class="ytab ${yr===detailYear?"active":""}" onclick="selYear('${yr}')">${yr}</span>`).join("");
  const hasPrev=years.includes(String(+detailYear-1));
  const rows=view.months.filter(m=>m.month.startsWith(detailYear)).map(m=>{
    const pm=view.months.find(x=>x.month===String(+detailYear-1)+m.month.slice(4));
    function yoy(cur,prev){
      if(!pm||!prev)return"";
      const pct=Math.round((cur-prev)/prev*100), up=pct>=0;
      return `<div class="yoy" style="color:${up?"var(--green)":"var(--red)"}">${up?"+":""}${pct}%</div>`;
    }
    return `<tr class="${m.occupancy>=65?"hot":""}">
      <td>${fmtMonth(m.month)}</td>
      <td>${m.nights}${yoy(m.nights,pm&&pm.nights)}</td>
      <td>${pill(m.occupancy)}${yoy(m.occupancy,pm&&pm.occupancy)}</td>
      <td>${m.avgPrice} €${yoy(m.avgPrice,pm&&pm.avgPrice)}</td>
      <td>${euro(m.revenue)}${yoy(m.revenue,pm&&pm.revenue)}</td></tr>`;
  }).join("");
  const note=hasPrev?`Comparaison avec ${+detailYear-1} (même mois) : <span style="color:var(--green)">vert</span> = hausse, <span style="color:var(--red)">rouge</span> = baisse.`:`Pas d'année précédente disponible pour comparer.`;
  return `<div class="card"><h2>Détail mensuel</h2>
    <div class="ytabs">${tabs}</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Mois</th><th>Nuits</th><th>Taux</th><th>Prix moy.</th><th>Revenu</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    <div class="note">${note}</div></div>`;
}

// Planning ménage — 60 prochains jours + message SMS copiable
function fmtDayFull(iso){const[y,m,d]=iso.split("-");return`${+d} ${FR_MONTHS[+m-1]}`;}
const JOURS=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
function dateSms(iso){const d=new Date(iso+"T00:00:00");const[y,m,dd]=iso.split("-");return`${JOURS[d.getDay()]} ${+dd} ${FR_LONG[+m-1]}`;}
function buildMsg(list){
  const lignes=list.map(t=>{
    let s="- "+dateSms(t.checkout);
    if(t.sameDay)s+=" (⚠️ ménage express, arrivée le jour même)";
    return s;
  }).join("\n");
  return `Bonjour ! \nVoici les prochains ménages à prévoir : \n${lignes}\n\nBonne journée ☀️`;
}
window.CLEAN_MSGS={};
function copyMsg(id,btn){
  const txt=window.CLEAN_MSGS[id];if(!txt)return;
  navigator.clipboard.writeText(txt).then(()=>{
    const old=btn.textContent;btn.textContent="✓ Copié !";setTimeout(()=>btn.textContent=old,1600);
  }).catch(()=>{alert("Copie impossible — sélectionne et copie manuellement :\n\n"+txt);});
}
function buildCleaningCard(view){
  const limit=new Date();limit.setDate(limit.getDate()+60);
  const limitIso=limit.toISOString().slice(0,10);
  const list=(view.turnovers||[]).filter(t=>t.checkout<=limitIso);
  window.CLEAN_MSGS={};
  if(!list.length) return `<div class="card"><h2>🧹 Planning ménage — 60 prochains jours</h2><div class="note">Aucun départ prévu sur les 60 prochains jours.</div></div>`;
  const express=list.filter(t=>t.sameDay).length;
  const rows=list.map(t=>{
    let status,color;
    if(t.sameDay){status="⚠️ Départ + arrivée le même jour — ménage express";color="var(--red)";}
    else if(t.gapDays!==null&&t.gapDays<=2){status=`Arrivée dans ${t.gapDays} j — ménage sous ${t.gapDays} j`;color="var(--amber)";}
    else if(t.nextCheckin){status=`Prochaine arrivée le ${fmtDayFull(t.nextCheckin)}`;color="var(--grey)";}
    else{status="Pas d'arrivée proche — à planifier";color="var(--grey)";}
    const house=view.isTotal?`<span style="color:var(--blue);font-weight:600">${t.house}</span> · `:"";
    return `<li><b>${fmtDayFull(t.checkout)}</b> — ${house}<span style="color:${color}">${status}</span></li>`;
  }).join("");

  // Boutons copier-coller
  let buttons="";
  if(view.isTotal){
    const byHouse={};
    for(const t of list)(byHouse[t.house]=byHouse[t.house]||[]).push(t);
    let i=0;
    for(const [house,items] of Object.entries(byHouse)){
      const id="h"+(i++);window.CLEAN_MSGS[id]=buildMsg(items);
      buttons+=`<button class="copybtn" onclick="copyMsg('${id}',this)">📋 Copier — ${house}</button>`;
    }
  }else{
    window.CLEAN_MSGS["single"]=buildMsg(list);
    buttons=`<button class="copybtn" onclick="copyMsg('single',this)">📋 Copier le message pour SMS</button>`;
  }

  return `<div class="card"><h2>🧹 Planning ménage — 60 prochains jours</h2>
    <div class="note" style="margin-top:0;margin-bottom:8px"><b>${list.length} ménage${list.length>1?"s":""}</b> à prévoir${express?`, dont <b style="color:var(--red)">${express} le jour même</b>`:""}.</div>
    <div>${buttons}</div>
    <ul class="gaplist">${rows}</ul></div>`;
}

function sel(i){current=i;render();}
function selYear(y){detailYear=y;render();}
load();
</script>
</body>
</html>
